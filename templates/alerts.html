<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Alerts</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#007BFF;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        a{
            text-decoration:none;
            padding:10px 20px;
            background:#007BFF;
            color:white;
            border-radius:5px;
        }

    </style>

</head>

<body>

<h1>Weather Alerts</h1>

<table>

<tr>
    <th>City</th>
    <th>Temperature</th>
    <th>Weather</th>
    <th>Alert</th>
</tr>

{% for alert in alerts %}

<tr>

    <td>{{ alert.city }}</td>

    <td>{{ alert.temp }} °C</td>

    <td>{{ alert.weather }}</td>

    <td>{{ alert.level }}</td>

</tr>

{% endfor %}

</table>

<br><br>

<a href="/">Back Home</a>

</body>
</html>
