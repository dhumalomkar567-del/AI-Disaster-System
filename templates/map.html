<!DOCTYPE html>
<html>
<head>
    <title>Disaster Map</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map{
            height:600px;
            width:90%;
            margin:auto;
            border-radius:10px;
        }

        h1{
            text-align:center;
            margin:20px;
        }
    </style>
</head>

<body>

<h1>🌍 AI Disaster Prediction Map</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([18.5204,73.8567],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

L.marker([18.5204,73.8567])
.addTo(map)
.bindPopup("Pune")
.openPopup();

</script>

</body>
</html>
