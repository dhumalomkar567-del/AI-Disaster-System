<!DOCTYPE html>
<html>

<head>
    <title>Prediction History</title>
</head>

<body>

<h1>Prediction History</h1>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Temperature</th>
    <th>Humidity</th>
    <th>Rainfall</th>
    <th>Risk</th>
</tr>

{% for row in data %}

<tr>

    <td>{{ row[0] }}</td>

    <td>{{ row[1] }}</td>

    <td>{{ row[2] }}</td>

    <td>{{ row[3] }}</td>

    <td>{{ row[4] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">⬅ Home</a>

</body>
</html>
